<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="קהת — נושאי הכלים | השכרת כלי נגינה מזרחיים">
<meta name="theme-color" content="#F2EBE0">
<!-- Open Graph for WhatsApp / social sharing -->
<meta property="og:title" content="קהת — נושאי הכלים">
<meta property="og:description" content="השכרת כלי נגינה מזרחיים | קאנון, קמנצ'ה, סנטור ועוד">
<meta property="og:type" content="website">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="קהת">
<!-- Android PWA -->
<link rel="manifest" href="manifest.json">
<title>קהת — נושאי הכלים</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#3E2410;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Noto Serif Hebrew',Georgia,serif;
    direction:rtl;
  }
  .loader{
    text-align:center;
    color:#F0D598;
  }
  .logo{font-size:56px;margin-bottom:16px;}
  .title{font-size:36px;font-weight:300;letter-spacing:8px;margin-bottom:8px;}
  .sub{font-size:13px;color:#9C7A5A;letter-spacing:2px;margin-bottom:32px;}
  .spinner{
    width:36px;height:36px;
    border:2px solid rgba(240,213,152,0.2);
    border-top-color:#D4A843;
    border-radius:50%;
    margin:0 auto;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader">
  <div class="logo">🪕</div>
  <div class="title">קהת</div>
  <div class="sub">נושאי הכלים</div>
  <div class="spinner"></div>
</div>
<script>
  // Redirect to main app after short delay (allows assets to load)
  setTimeout(()=>{ window.location.href = 'kehat-app.html'; }, 800);
</script>
</body>
</html>
